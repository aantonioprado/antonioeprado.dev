name: CD

on:
  push:
    branches: [main]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          include-hidden-files: true

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Validate secrets
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          : "${SSH_HOST:?Secret SSH_HOST is not set}"
          : "${SSH_PORT:?Secret SSH_PORT is not set}"
          : "${SSH_USERNAME:?Secret SSH_USERNAME is not set}"
          : "${SSH_PRIVATE_KEY:?Secret SSH_PRIVATE_KEY is not set}"
          : "${DEPLOY_PATH:?Secret DEPLOY_PATH is not set}"

          TARGET_PATH="${DEPLOY_PATH%/}"

      - name: Setup SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Scan host key
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          ssh-keyscan -T 30 -p "${SSH_PORT}" -H "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Prepare remote directory
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          TARGET_PATH="${DEPLOY_PATH%/}"
          ssh -i ~/.ssh/id_rsa -p "${SSH_PORT}" "${SSH_USERNAME}@${SSH_HOST}" "mkdir -p '$TARGET_PATH'"

      - name: Deploy via rsync
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          TARGET_PATH="${DEPLOY_PATH%/}"
          rsync -avzc --itemize-changes --omit-dir-times \
            -e "ssh -i ~/.ssh/id_rsa -p ${SSH_PORT}" \
            dist/ "$SSH_USERNAME@$SSH_HOST:$TARGET_PATH/"
