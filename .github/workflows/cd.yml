name: CD

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

jobs:
  cd:
    name: CD
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Scan host key
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          ssh-keyscan -p "${SSH_PORT}" -H "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Deploy via rsync
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
          BASE_BRANCH: ${{ github.event.workflow_run.pull_requests[0].base.ref }}
          DEPLOY_PATH_MAIN: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_PATH_DEVELOP: ${{ secrets.DEVELOP_PATH }}
        run: |
          if [ "$BASE_BRANCH" = "main" ]; then
            TARGET_PATH="$DEPLOY_PATH_MAIN"
          else
            TARGET_PATH="$DEPLOY_PATH_DEVELOP"
          fi
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/id_rsa -p ${SSH_PORT}" \
            dist/ "$SSH_USERNAME@$SSH_HOST:$TARGET_PATH/"
